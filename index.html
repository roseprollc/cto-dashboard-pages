    --bg: #050B1A;
    --bg-2: #0A1528;
    --surface: rgba(16, 28, 52, 0.6);
    --surface-solid: #0F1B34;
    --surface-hi: rgba(22, 38, 68, 0.7);
    --line: rgba(255, 255, 255, 0.08);
    --line-hi: rgba(255, 255, 255, 0.16);
    --text: #E8EEF9;
    --text-dim: #9FB0CC;
    --text-mute: #5F728F;
    --glow-cyan: #3d8fb9; /* desaturated navy-cyan */
    --chart-grid: rgba(255, 255, 255, 0.06);
  }
  html[data-theme="light"] {
    --bg: #F4F6FB;
    --bg-2: #EAEEF6;
    --surface: #FFFFFF;
    --surface-solid: #FFFFFF;
    --surface-hi: #F8FAFC;
    --line: #E5E9F0;
    --line-hi: #CBD5E1;
    --text: #0F172A;
    --text-dim: #475569;
    --text-mute: #94A3B8;
    --glow-cyan: #2B4F72;
    --chart-grid: rgba(15, 23, 42, 0.08);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    font-family: "Space Grotesk", ui-sans-serif, system-ui, -apple-system, sans-serif;
    color: var(--text);
    background: var(--bg);
    background-image:
      radial-gradient(1200px 700px at 10% -10%, rgba(230, 126, 34, 0.08), transparent 60%),
      radial-gradient(900px 600px at 110% 10%, rgba(43, 79, 114, 0.35), transparent 60%),
      radial-gradient(800px 500px at 50% 110%, rgba(16, 185, 129, 0.05), transparent 60%);
    background-attachment: fixed;
    transition: background-color 300ms, color 300ms;
  }
  html[data-theme="light"] body {
    background-image:
      radial-gradient(1200px 700px at 10% -10%, rgba(230, 126, 34, 0.05), transparent 60%),
      radial-gradient(900px 600px at 110% 10%, rgba(43, 79, 114, 0.08), transparent 60%);
  }

  /* Grid texture */
  .grid-bg {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      linear-gradient(to right, var(--chart-grid) 1px, transparent 1px),
      linear-gradient(to bottom, var(--chart-grid) 1px, transparent 1px);
    background-size: 64px 64px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
  }

  /* Utility animations */
  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5), 0 0 20px 0 rgba(239, 68, 68, 0.25); }
    50%      { box-shadow: 0 0 0 6px rgba(239, 68, 68, 0), 0 0 28px 0 rgba(239, 68, 68, 0.45); }
  }
  @keyframes rotate-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes orbit-dash  { to { stroke-dashoffset: -40; } }
  @keyframes fade-up     { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes shimmer     { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

  .mono { font-family: "JetBrains Mono", ui-monospace, Menlo, monospace; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }
  .tab-pill { font-family: "Space Grotesk", sans-serif; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--line-hi); border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--brand-orange); }

  /* Panel base */
  .panel {
    background: var(--surface);
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    border: 1px solid var(--line);
    border-radius: 16px;
    box-shadow: 0 1px 0 rgba(255,255,255,0.03) inset, 0 20px 40px rgba(0,0,0,0.3);
  }
  html[data-theme="light"] .panel {
    box-shadow: 0 1px 2px rgba(15,23,42,0.04), 0 8px 24px rgba(15,23,42,0.04);
  }

  /* Hairline accent on panels */
  .panel-accent::before {
    content: ""; position: absolute; top: 0; left: 24px; right: 24px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--brand-orange), transparent);
    opacity: 0.6;
  }

  /* Selection */
  ::selection { background: rgba(230, 126, 34, 0.3); color: var(--text); }
</style>

<script type="text/babel">
// Hooks + helpers for Dashboard v3

// -----------------------------------------------------------------------------
// useCountUp — smoothly animate a number from 0 to target on mount / when it changes.
// Accepts strings with embedded numbers (e.g. "238.96 h/month") and animates only the numeric part.
// -----------------------------------------------------------------------------
function useCountUp(target, durationMs = 1200) {
  const [display, setDisplay] = React.useState(
    typeof target === "number" ? 0 : String(target).replace(/[\d.]+/, "0")
  );
  React.useEffect(() => {
    if (target === null || target === undefined) return;
    let raf;
    const start = performance.now();
    const numMatch = typeof target === "number"
      ? { value: target, str: null }
      : (String(target).match(/([\d,]+(?:\.\d+)?)/)
          ? { value: parseFloat(String(target).match(/([\d,]+(?:\.\d+)?)/)[1].replace(/,/g, "")),
              str: String(target) }
          : null);
    if (!numMatch || isNaN(numMatch.value)) { setDisplay(target); return; }

    const decimals = String(numMatch.value).includes(".")
      ? String(numMatch.value).split(".")[1].length : 0;
    const frame = (now) => {
      const t = Math.min(1, (now - start) / durationMs);
      const eased = 1 - Math.pow(1 - t, 3); // ease-out cubic
      const v = numMatch.value * eased;
      const formatted = v.toFixed(decimals);
      if (numMatch.str === null) {
        setDisplay(parseFloat(formatted));
      } else {
        setDisplay(numMatch.str.replace(/([\d,]+(?:\.\d+)?)/, formatted));
      }
      if (t < 1) raf = requestAnimationFrame(frame);
    };
    raf = requestAnimationFrame(frame);
    return () => cancelAnimationFrame(raf);
  }, [target, durationMs]);
  return display;
}
window.useCountUp = useCountUp;

// -----------------------------------------------------------------------------
// useTheme — light/dark toggle persisted in localStorage.
// -----------------------------------------------------------------------------
function useTheme() {
  const [theme, setTheme] = React.useState(() => {
    try {
      // Reset to light default if first run of v3.1
      const ver = localStorage.getItem("dash-v3-theme-ver");
      if (ver !== "3.1") {
        localStorage.setItem("dash-v3-theme", "light");
        localStorage.setItem("dash-v3-theme-ver", "3.1");
        return "light";
      }
      return localStorage.getItem("dash-v3-theme") || "light";
    } catch { return "light"; }
  });
  React.useEffect(() => {
    document.documentElement.setAttribute("data-theme", theme);
    try { localStorage.setItem("dash-v3-theme", theme); } catch {}
  }, [theme]);
  return [theme, setTheme];
}
window.useTheme = useTheme;

// -----------------------------------------------------------------------------
// Time-range presets — the slider maps to these four windows.
// Each returns a scaling factor applied to raw KPI values so hover/drag feels responsive.
// -----------------------------------------------------------------------------
const TimeRanges = [
  { key: "apr",     label: "Apr",       sub: "this month", scale: 0.48, chartSlice: [ -4, undefined ] },
  { key: "mar-apr", label: "Mar–Apr",   sub: "2 months",   scale: 0.82, chartSlice: [ -8, undefined ] },
  { key: "feb-apr", label: "Feb–Apr",   sub: "rolling Q",  scale: 1.00, chartSlice: [   0, undefined ] }, // default
  { key: "all",     label: "All time",  sub: "12 months",  scale: 1.35, chartSlice: [   0, undefined ] }
];
window.TimeRanges = TimeRanges;

// Apply scale to any string KPI (preserves formatting).
function scaleKpi(str, scale) {
  if (typeof str !== "string") return str;
  return str.replace(/([\d,]+(?:\.\d+)?)/, (m) => {
    const n = parseFloat(m.replace(/,/g, ""));
    if (isNaN(n)) return m;
    const decimals = m.includes(".") ? m.split(".")[1].length : 0;
    return (n * scale).toFixed(decimals);
  });
}
window.scaleKpi = scaleKpi;

// -----------------------------------------------------------------------------
// Selection context — one global "hovered developer" + "focused project".
// Consumed by KPI tiles, orbit, and capacity rings to cross-highlight.
// -----------------------------------------------------------------------------
const DashCtx = React.createContext({
  hoverDev: null, setHoverDev: () => {},
  focusProject: null, setFocusProject: () => {}
});
window.DashCtx = DashCtx;

function DashProvider({ children }) {
  const [hoverDev, setHoverDev] = React.useState(null);
  const [focusProject, setFocusProject] = React.useState(null);
  const value = React.useMemo(
    () => ({ hoverDev, setHoverDev, focusProject, setFocusProject }),
    [hoverDev, focusProject]
  );
  return <DashCtx.Provider value={value}>{children}</DashCtx.Provider>;
}
window.DashProvider = DashProvider;

// -----------------------------------------------------------------------------
// Shared color helpers
// -----------------------------------------------------------------------------
window.StatusColor = {
  healthy:   "var(--brand-green)",
  "at-risk": "var(--brand-amber)",
  critical:  "var(--brand-red)",
  inactive:  "var(--text-mute)"
};
window.StatusColorRaw = {
  healthy:   "#10B981",
  "at-risk": "#F59E0B",
  critical:  "#EF4444",
  inactive:  "#64748B"
};
window.ProjectColor = {
  flashtrac:     "#E67E22",
  navigator:     "#2B4F72",
  datawarehouse: "#10B981",
  automations:   "#A855F7",   // only added color beyond brand to differentiate 4 projects
  product:       "#64748B",
  delivery:      "#0EA5E9"
};
// Capacity matrix colors (match the Cross-Project Capacity chart legend)
window.AllocColor = {
  ft: "#E67E22", navi: "#2B4F72", dwh: "#10B981", rpa: "#A855F7"
};

function utilColor(u) {
  if (u > 100) return "#EF4444";
  if (u >= 85 && u <= 100) return "#10B981";
  if (u >= 50) return "#F59E0B";
  return "#64748B";
}
window.utilColor = utilColor;

<script type="text/babel">
// Visual primitives for Dashboard v3

function StatusDot({ status, size = 8, pulse = false }) {

function PillTab({ active, onClick, children, dot, compact, glow = "var(--brand-orange)" }) {
  return (
    <button onClick={onClick} className="tab-pill" style={{
      position: "relative",
      display: "inline-flex", alignItems: "center", gap: 8,

                               boxShadow: `0 0 8px ${dot}` }}></span>}
      {children}
    </button>
  );
}
window.PillTab = PillTab;

// Donut / ring chart
function Donut({ value, max = 100, size = 120, stroke = 12, color = "var(--brand-orange)", trackColor = "var(--line)", label, sublabel, animate = true, delay = 0 }) {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const [progress, setProgress] = React.useState(animate ? 0 : value);
  React.useEffect(() => {
    if (!animate) { setProgress(value); return; }
    const id = setTimeout(() => setProgress(value), 80 + delay);
    return () => clearTimeout(id);
  }, [value, animate, delay]);
  const pct = Math.min(1, Math.max(0, progress / max));
  return (
    <div style={{ position: "relative", width: size, height: size }}>
      <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={trackColor} strokeWidth={stroke} />
        <circle cx={size/2} cy={size/2} r={r} fill="none"
                stroke={color} strokeWidth={stroke} strokeLinecap="round"
                strokeDasharray={`${c * pct} ${c}`}
                style={{ transition: "stroke-dasharray 1200ms cubic-bezier(0.22, 1, 0.36, 1)",
                          filter: `drop-shadow(0 0 6px ${color})` }} />
      </svg>
      <div style={{
        position: "absolute", inset: 0,
        display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center"
      }}>
        {label && <div className="mono" style={{ fontSize: size * 0.24, fontWeight: 700, color: "var(--text)", lineHeight: 1 }}>{label}</div>}
        {sublabel && <div style={{ fontSize: 10, color: "var(--text-mute)", textTransform: "uppercase",
                                      letterSpacing: "0.08em", marginTop: 4 }}>{sublabel}</div>}
      </div>
    </div>
  );
}
window.Donut = Donut;

// Inline sparkline
function Spark({ data, color = "var(--brand-orange)", width = 140, height = 36, fill = true }) {
  if (!data || data.length < 2) return <span style={{ color: "var(--text-mute)" }}>—</span>;
  const min = Math.min(...data);
  const max = Math.max(...data);
  const range = max - min || 1;
  const step = width / (data.length - 1);
  const pts = data.map((v, i) => [i * step, height - ((v - min) / range) * (height - 4) - 2]);
  const d = pts.map((p, i) => (i === 0 ? "M" : "L") + p[0].toFixed(1) + "," + p[1].toFixed(1)).join(" ");
  const area = d + ` L ${width},${height} L 0,${height} Z`;
  return (
    <svg width={width} height={height} style={{ overflow: "visible" }}>
      {fill && <path d={area} fill={color} opacity="0.12" />}
      <path d={d} fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"
            style={{ filter: `drop-shadow(0 0 3px ${color}88)` }} />
      <circle cx={pts[pts.length-1][0]} cy={pts[pts.length-1][1]} r="2.5" fill={color} />
    </svg>
  );
}
window.Spark = Spark;

        color: "var(--text-dim)"
      }}>{title}</span>
      <span style={{ flex: 1 }}></span>
      {right}
    </div>
  );
}
window.PanelHeader = PanelHeader;

// Section label (used between big sections)
function SectionLabel({ children, muted }) {
  return (
    <div style={{
      display: "flex", alignItems: "center", gap: 10,
      margin: "6px 2px 14px",

    }}>
      <span style={{ width: 18, height: 1, background: "var(--brand-orange)", opacity: 0.8 }}></span>

                title={`Switch to ${theme === "dark" ? "light" : "dark"} mode`}
                style={{
          width: 40, height: 40, borderRadius: 10,
          border: "1px solid var(--line)",
          background: "var(--surface-hi)",
          color: "var(--text-dim)",
          display: "inline-flex", alignItems: "center", justifyContent: "center",
          cursor: "pointer", transition: "all 200ms"
        }}
        onMouseEnter={e => { e.currentTarget.style.borderColor = "var(--brand-orange)"; e.currentTarget.style.color = "var(--brand-orange)"; }}
        onMouseLeave={e => { e.currentTarget.style.borderColor = "var(--line)"; e.currentTarget.style.color = "var(--text-dim)"; }}>
          {theme === "dark" ? (
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
            </svg>
          ) : (
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          )}
        </button>
      </div>
    </header>
  );
}
window.TopBar = TopBar;

<script type="text/babel">
// DeveloperOrbit — hero visualization
// Central "Portfolio" planet, developers orbit at a radius proportional to their
// total allocation (more allocated = closer / faster). Project "moons" sit on
// satellite orbits. Particle flow along the orbit paths provides ambient motion.

function DeveloperOrbit({ capacity, projects, focusProject, setFocusProject, hoverDev, setHoverDev, height = 440 }) {
  const size = 560; // logical SVG size; will scale to container
  const cx = size / 2;
  const cy = size / 2;
  const rInner = 80;   // planet radius
  const rMax = 230;    // outer orbit
  const rMin = 130;    // inner orbit

  const devs = capacity.rows;
  // Total alloc range → radius range (higher alloc → inner)
  const totals = devs.map(d => d.ft + d.navi + d.dwh + d.rpa);
  const maxT = Math.max(...totals);
  const minT = Math.min(...totals);

  const devNodes = devs.map((d, i) => {
    const total = totals[i];
    const t = maxT === minT ? 0.5 : 1 - (total - minT) / (maxT - minT);
    const r = rMin + t * (rMax - rMin);
    // Cluster devs by primary project for angular layout
    const primary =
      d.ft > Math.max(d.navi, d.dwh, d.rpa) ? "ft" :
      d.navi > Math.max(d.ft, d.dwh, d.rpa) ? "navi" :
      d.dwh > Math.max(d.ft, d.navi, d.rpa) ? "dwh" :
      d.rpa > 0 ? "rpa" : "ft";
    // Angular slot per project
    const slotStart = { ft: -90, navi: 0, dwh: 90, rpa: 180 }[primary];
    const sameProj = devs.filter((_, j) =>
      ((_.ft > Math.max(_.navi, _.dwh, _.rpa) ? "ft" :
        _.navi > Math.max(_.ft, _.dwh, _.rpa) ? "navi" :
        _.dwh > Math.max(_.ft, _.navi, _.rpa) ? "dwh" :
        _.rpa > 0 ? "rpa" : "ft")) === primary
    );
    const idx = sameProj.indexOf(d);
    const spread = 60; // degrees
    const step = sameProj.length > 1 ? spread / (sameProj.length - 1) : 0;
    const angleDeg = slotStart - spread / 2 + idx * step;
    const angle = angleDeg * Math.PI / 180;
    return {
      ...d, primary, r, angleDeg, angle, total,
      x: cx + Math.cos(angle) * r,
      y: cy + Math.sin(angle) * r,
      util: d.util
    };
  });

  const projectKeys = Object.keys(projects);
  const projectNodes = projectKeys.map((key, i) => {
    const p = projects[key];
    const angle = (i / projectKeys.length) * 2 * Math.PI - Math.PI / 2;
    const r = rMax + 40;
    return {
      key, ...p,
      x: cx + Math.cos(angle) * r,
      y: cy + Math.sin(angle) * r,
      color: window.ProjectColor[key]
    };
  });

  const focused = focusProject ? devNodes.filter(d => {
    if (focusProject === "flashtrac")     return d.ft > 0;
    if (focusProject === "navigator")     return d.navi > 0;
    if (focusProject === "datawarehouse") return d.dwh > 0;
    if (focusProject === "automations")   return d.rpa > 0;
    return true;
  }) : null;

  return (
    <div style={{ position: "relative", width: "100%", height, minHeight: 360 }}>
      <svg viewBox={`0 0 ${size} ${size}`} preserveAspectRatio="xMidYMid meet"
           style={{ width: "100%", height: "100%", display: "block" }}>
        <defs>
          <radialGradient id="orbit-planet" cx="35%" cy="30%">
            <stop offset="0%" stopColor="#3d6d99" />
            <stop offset="55%" stopColor="#2B4F72" />
            <stop offset="100%" stopColor="#0F1B34" />
          </radialGradient>
          <radialGradient id="orbit-planet-glow" cx="50%" cy="50%">
            <stop offset="0%" stopColor="rgba(230,126,34,0.4)" />
            <stop offset="60%" stopColor="rgba(230,126,34,0.1)" />
            <stop offset="100%" stopColor="rgba(230,126,34,0)" />
          </radialGradient>
          <filter id="orbit-blur"><feGaussianBlur stdDeviation="8"/></filter>
          <filter id="orbit-soft" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
          </filter>
        </defs>

        {/* Ambient halo */}
        <circle cx={cx} cy={cy} r={rMax + 60} fill="url(#orbit-planet-glow)" />

        {/* Orbit rings */}
        {[rMin, (rMin + rMax) / 2, rMax].map((r, i) => (
          <circle key={i} cx={cx} cy={cy} r={r} fill="none"
                  stroke="var(--line)" strokeWidth={0.5}
                  strokeDasharray={i === 1 ? "3 5" : "none"} />
        ))}

        {/* Outer project orbit ring */}
        <circle cx={cx} cy={cy} r={rMax + 40} fill="none"
                stroke="var(--line)" strokeWidth={0.5} strokeDasharray="2 8" />

        {/* Rotating particle ring (slow) */}
        <g style={{ transformOrigin: `${cx}px ${cy}px`, animation: "rotate-slow 60s linear infinite" }}>
          {Array.from({ length: 12 }).map((_, i) => {
            const a = (i / 12) * 2 * Math.PI;
            return <circle key={i}
                            cx={cx + Math.cos(a) * (rMin + rMax) / 2}
                            cy={cy + Math.sin(a) * (rMin + rMax) / 2}
                            r={1.2} fill="var(--brand-orange)" opacity="0.55"/>;
          })}
        </g>
        <g style={{ transformOrigin: `${cx}px ${cy}px`, animation: "rotate-slow 90s linear infinite reverse" }}>
          {Array.from({ length: 18 }).map((_, i) => {
            const a = (i / 18) * 2 * Math.PI;
            return <circle key={i}
                            cx={cx + Math.cos(a) * rMax}
                            cy={cy + Math.sin(a) * rMax}
                            r={0.9} fill="var(--brand-green)" opacity="0.45"/>;
          })}
        </g>

        {/* Central planet glow + planet */}
        <circle cx={cx} cy={cy} r={rInner + 18} fill="url(#orbit-planet-glow)" />
        <circle cx={cx} cy={cy} r={rInner} fill="url(#orbit-planet)"
                stroke="rgba(230,126,34,0.35)" strokeWidth="1" />
        {/* Latitude lines on planet for depth */}
        <ellipse cx={cx} cy={cy} rx={rInner * 0.9} ry={rInner * 0.28}
                  fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth="0.8" />
        <ellipse cx={cx} cy={cy - 20} rx={rInner * 0.85} ry={rInner * 0.2}
                  fill="none" stroke="rgba(255,255,255,0.05)" strokeWidth="0.6" />

        {/* Planet label */}
        <text x={cx} y={cy - 8} textAnchor="middle"
              fontSize="10" fontWeight="700" letterSpacing="3"
              fill="rgba(230,126,34,0.9)" style={{ textTransform: "uppercase" }}>
          PORTFOLIO
        </text>
        <text x={cx} y={cy + 14} textAnchor="middle" fontFamily="JetBrains Mono"
              fontSize="22" fontWeight="700" fill="#FFFFFF">
          {capacity.utilization}%
        </text>
        <text x={cx} y={cy + 30} textAnchor="middle"
              fontSize="9" letterSpacing="2"
              fill="rgba(255,255,255,0.55)">UTILIZATION</text>

        {/* Connection lines from planet to each developer (hover highlight) */}
        {devNodes.map((d, i) => {
          const isHovered = hoverDev === d.name;
          const isDim = (hoverDev && hoverDev !== d.name) ||
                         (focused && !focused.includes(d));
          const col = window.utilColor(d.util);
          return (
            <line key={`line-${i}`}
                  x1={cx} y1={cy} x2={d.x} y2={d.y}
                  stroke={isHovered ? col : window.AllocColor[d.primary]}
                  strokeWidth={isHovered ? 1.4 : 0.5}
                  strokeDasharray={isHovered ? "none" : "2 4"}
                  opacity={isDim ? 0.08 : (isHovered ? 0.85 : 0.22)}
                  style={{ transition: "all 220ms" }} />
          );
        })}

        {/* Project moons */}
        {projectNodes.map((p, i) => {
          const isFocus = focusProject === p.key;
          const dim = focusProject && focusProject !== p.key;
          return (
            <g key={p.key}
               onClick={() => setFocusProject(isFocus ? null : p.key)}
               style={{ cursor: "pointer", opacity: dim ? 0.35 : 1, transition: "opacity 220ms" }}>
              <circle cx={p.x} cy={p.y} r={isFocus ? 26 : 22}
                      fill={p.color + "33"}
                      stroke={p.color}
                      strokeWidth={isFocus ? 2 : 1}
                      style={{ filter: `drop-shadow(0 0 ${isFocus ? 12 : 6}px ${p.color})`,
                                transition: "all 220ms" }} />
              <text x={p.x} y={p.y - 2} textAnchor="middle"
                    fontSize="9" fontWeight="700" letterSpacing="1"
                    fill="#FFFFFF" style={{ textTransform: "uppercase" }}>
                {p.key === "flashtrac" ? "FT"
                  : p.key === "navigator" ? "NAVI"
                  : p.key === "datawarehouse" ? "DWH"
                  : p.key === "automations" ? "RPA"
                  : "PROD"}
              </text>
              <text x={p.x} y={p.y + 10} textAnchor="middle"
                    fontFamily="JetBrains Mono"
                    fontSize="8" fill="rgba(255,255,255,0.7)">
                {p.status === "healthy" ? "●" : p.status === "at-risk" ? "◐" : p.status === "critical" ? "✕" : "◌"}
              </text>
            </g>
          );
        })}

        {/* Developer nodes */}
        {devNodes.map((d, i) => {
          const isHovered = hoverDev === d.name;
          const isDim = (hoverDev && hoverDev !== d.name) ||
                         (focused && !focused.includes(d));
          const col = window.utilColor(d.util);
          const initials = d.name.split(" ").map(w => w[0]).join("").slice(0, 2);
          return (
            <g key={d.name}
               onMouseEnter={() => setHoverDev(d.name)}
               onMouseLeave={() => setHoverDev(null)}
               style={{ cursor: "pointer", opacity: isDim ? 0.3 : 1,
                         transition: "opacity 220ms" }}>
              {isHovered && (
                <circle cx={d.x} cy={d.y} r="18" fill="none"
                        stroke={col} strokeWidth="1"
                        style={{ animation: "pulse-glow 1.5s infinite", opacity: 0.6 }} />
              )}
              <circle cx={d.x} cy={d.y} r={isHovered ? 14 : 11}
                      fill="var(--surface-solid)"
                      stroke={col}
                      strokeWidth={isHovered ? 2 : 1.5}
                      style={{ filter: `drop-shadow(0 0 ${isHovered ? 8 : 4}px ${col})`,
                                transition: "all 200ms" }} />
              <text x={d.x} y={d.y + 3.5} textAnchor="middle"
                    fontSize="8.5" fontWeight="700" fill="#FFFFFF"
                    style={{ pointerEvents: "none", letterSpacing: "0.5px" }}>
                {initials}
              </text>
            </g>
          );
        })}

        {/* Hover tooltip */}
        {hoverDev && (() => {
          const d = devNodes.find(x => x.name === hoverDev);
          if (!d) return null;
          const tx = d.x + 24;
          const ty = d.y - 38;
          return (
            <g style={{ pointerEvents: "none" }}>
              <rect x={tx - 6} y={ty - 4} width="140" height="70" rx="8"
                    fill="rgba(10,21,40,0.92)" stroke={window.utilColor(d.util)} strokeWidth="1" />
              <text x={tx + 4} y={ty + 12} fontSize="11" fontWeight="700" fill="#FFFFFF">{d.name}</text>
              <text x={tx + 4} y={ty + 28} fontFamily="JetBrains Mono" fontSize="10" fill="rgba(255,255,255,0.7)">
                {d.actual.toFixed(1)} / {d.capacity}h
              </text>
              <text x={tx + 4} y={ty + 42} fontFamily="JetBrains Mono" fontSize="11" fontWeight="700"
                    fill={window.utilColor(d.util)}>
                {d.util}% util · {d.total}% alloc
              </text>
              <text x={tx + 4} y={ty + 56} fontSize="9" fill="rgba(255,255,255,0.55)"
                    style={{ letterSpacing: "0.06em", textTransform: "uppercase" }}>
                {[d.ft && `FT ${d.ft}%`, d.navi && `NAVI ${d.navi}%`,
                  d.dwh && `DWH ${d.dwh}%`, d.rpa && `RPA ${d.rpa}%`]
                  .filter(Boolean).join(" · ")}
              </text>
            </g>
          );
        })()}
      </svg>

      {/* Corner stats overlay */}
      <div style={{ position: "absolute", top: 14, left: 18, pointerEvents: "none" }}>
        <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.18em",
                        textTransform: "uppercase", color: "var(--text-mute)" }}>
          Orbit view
        </div>
        <div style={{ fontSize: 13, color: "var(--text-dim)", marginTop: 4, maxWidth: 220, lineHeight: 1.4 }}>
          {capacity.rows.length} developers · {Object.keys(projects).length} projects
        </div>
      </div>

      <div style={{ position: "absolute", top: 14, right: 18, textAlign: "right", pointerEvents: "none" }}>
        <div className="mono" style={{ fontSize: 11, color: "var(--text-mute)" }}>
          {capacity.plannedHours}h planned · {capacity.actualHours}h actual
        </div>
        <div style={{ fontSize: 10, color: "var(--text-mute)", marginTop: 4, letterSpacing: "0.08em" }}>
          {capacity.month}
        </div>
      </div>

      {/* Bottom instruction */}
      <div style={{ position: "absolute", bottom: 12, left: "50%", transform: "translateX(-50%)",
                      fontSize: 10.5, color: "var(--text-mute)", letterSpacing: "0.08em",
                      textTransform: "uppercase", pointerEvents: "none" }}>
        Hover a node to highlight · click a moon to focus a project
      </div>
    </div>
  );
}
window.DeveloperOrbit = DeveloperOrbit;

</script>
<script type="text/babel">
// ProjectTorus — alternate hero: radial portfolio health ring with project nodes
// Variant 2: each project = arc segment, sized by headcount allocation.

function ProjectTorus({ capacity, projects, focusProject, setFocusProject, height = 440 }) {
  const size = 560;
  const cx = size / 2, cy = size / 2;
  const rOuter = 220, rInner = 160;

  const entries = Object.entries(projects);
  // allocation weights
  const weights = entries.map(([key]) => {
    const k = key === "flashtrac" ? "ft"
           : key === "navigator" ? "navi"
           : key === "datawarehouse" ? "dwh"
           : key === "automations" ? "rpa" : null;
    if (!k) return 0;
    return capacity.rows.reduce((s, r) => s + r[k], 0);
  });
  const totalW = weights.reduce((a, b) => a + b, 0) || 1;
  const gap = 0.02; // in fraction
  let angleAcc = -Math.PI / 2;

  const arcs = entries.map(([key, p], i) => {
    const frac = weights[i] / totalW;
    const sweep = frac * 2 * Math.PI - gap;
    const a0 = angleAcc + gap / 2;
    const a1 = a0 + sweep;
    angleAcc += frac * 2 * Math.PI;
    const midA = (a0 + a1) / 2;
    return { key, p, a0, a1, midA, weight: weights[i] };
  });

  function arcPath(a0, a1, rO, rI) {
    const large = (a1 - a0) > Math.PI ? 1 : 0;
    const x0 = cx + Math.cos(a0) * rO, y0 = cy + Math.sin(a0) * rO;
    const x1 = cx + Math.cos(a1) * rO, y1 = cy + Math.sin(a1) * rO;
    const x2 = cx + Math.cos(a1) * rI, y2 = cy + Math.sin(a1) * rI;
    const x3 = cx + Math.cos(a0) * rI, y3 = cy + Math.sin(a0) * rI;
    return `M ${x0} ${y0} A ${rO} ${rO} 0 ${large} 1 ${x1} ${y1} L ${x2} ${y2} A ${rI} ${rI} 0 ${large} 0 ${x3} ${y3} Z`;
  }

  return (
    <div style={{ position: "relative", width: "100%", height, minHeight: 360 }}>
      <svg viewBox={`0 0 ${size} ${size}`} style={{ width: "100%", height: "100%", display: "block" }}>
        <defs>
          <radialGradient id="torus-core" cx="50%" cy="50%">
            <stop offset="0%" stopColor="#3d6d99" />
            <stop offset="100%" stopColor="#0F1B34" />
          </radialGradient>
        </defs>
        {/* Outer guide ring */}
        <circle cx={cx} cy={cy} r={rOuter + 14} fill="none" stroke="var(--line)" strokeDasharray="2 6"/>
        {/* Project arcs */}
        {arcs.map(({ key, p, a0, a1, midA }) => {
          const col = window.ProjectColor[key];
          const focused = focusProject === key;
          const dim = focusProject && !focused;
          return (
            <g key={key} onClick={() => setFocusProject(focused ? null : key)}
               style={{ cursor: "pointer", opacity: dim ? 0.3 : 1, transition: "opacity 220ms" }}>
              <path d={arcPath(a0, a1, rOuter, rInner)}
                    fill={col}
                    stroke={focused ? "#FFFFFF" : "rgba(255,255,255,0.08)"}
                    strokeWidth={focused ? 1.5 : 0.5}
                    opacity={focused ? 0.95 : 0.7}
                    style={{ filter: `drop-shadow(0 0 ${focused ? 14 : 6}px ${col})`,
                              transition: "all 220ms" }} />
              <text x={cx + Math.cos(midA) * ((rOuter + rInner) / 2)}
                    y={cy + Math.sin(midA) * ((rOuter + rInner) / 2) - 2}
                    textAnchor="middle" fontSize="10" fontWeight="700" letterSpacing="1.5"
                    fill="#FFFFFF" style={{ textTransform: "uppercase", pointerEvents: "none" }}>
                {p.name.length > 14 ? p.name.slice(0, 12) + "…" : p.name}
              </text>
              <text x={cx + Math.cos(midA) * ((rOuter + rInner) / 2)}
                    y={cy + Math.sin(midA) * ((rOuter + rInner) / 2) + 12}
                    textAnchor="middle" fontFamily="JetBrains Mono" fontSize="10"
                    fill="rgba(255,255,255,0.75)" style={{ pointerEvents: "none" }}>
                {p.velocity || "—"}
              </text>
            </g>
          );
        })}
        {/* Inner planet */}
        <circle cx={cx} cy={cy} r={rInner - 8} fill="url(#torus-core)"
                stroke="rgba(230,126,34,0.3)" strokeWidth="1"/>
        <text x={cx} y={cy - 6} textAnchor="middle" fontSize="10" fontWeight="700"
              letterSpacing="3" fill="rgba(230,126,34,0.9)" style={{ textTransform: "uppercase" }}>PORTFOLIO</text>
        <text x={cx} y={cy + 20} textAnchor="middle" fontFamily="JetBrains Mono"
              fontSize="28" fontWeight="700" fill="#FFFFFF">{capacity.utilization}%</text>
        <text x={cx} y={cy + 38} textAnchor="middle" fontSize="9"
              letterSpacing="2" fill="rgba(255,255,255,0.55)">UTILIZATION</text>
      </svg>
      <div style={{ position: "absolute", bottom: 12, left: "50%", transform: "translateX(-50%)",
                      fontSize: 10.5, color: "var(--text-mute)", letterSpacing: "0.08em",
                      textTransform: "uppercase" }}>
        Click an arc to focus a project
      </div>
    </div>
  );
}
window.ProjectTorus = ProjectTorus;

</script>
<script type="text/babel">
// FlowDiagram — alternate hero: Backlog → In Progress → Review → Done with particle flow.

function FlowDiagram({ capacity, projects, focusProject, setFocusProject, height = 440 }) {
  const stages = [
    { key: "backlog",  label: "Backlog",      count: 34 },
    { key: "progress", label: "In Progress",  count: 12 },
    { key: "review",   label: "In Review",    count: 6  },
    { key: "done",     label: "Shipped",      count: 23 }
  ];
  const size = { w: 720, h: 360 };
  const colWidth = size.w / stages.length;
  const nodeH = 72;

  return (
    <div style={{ position: "relative", width: "100%", height, minHeight: 360 }}>
      <svg viewBox={`0 0 ${size.w} ${size.h}`} preserveAspectRatio="xMidYMid meet"
           style={{ width: "100%", height: "100%" }}>
        <defs>
          <linearGradient id="flow-grad" x1="0" x2="1">
            <stop offset="0%" stopColor="var(--brand-orange)" stopOpacity="0"/>
            <stop offset="50%" stopColor="var(--brand-orange)" stopOpacity="0.8"/>
            <stop offset="100%" stopColor="var(--brand-orange)" stopOpacity="0"/>
          </linearGradient>
        </defs>
        {/* Connector rails */}
        {stages.slice(0, -1).map((s, i) => {
          const x1 = (i + 0.5) * colWidth + 80;
          const x2 = (i + 1.5) * colWidth - 80;
          const y = size.h / 2;
          return (
            <g key={i}>
              <line x1={x1} y1={y} x2={x2} y2={y}
                    stroke="var(--line-hi)" strokeWidth="1" strokeDasharray="3 5"/>
              {/* Moving particles */}
              {Array.from({length: 3}).map((_, j) => (
                <circle key={j} r="3" fill="var(--brand-orange)"
                        style={{ filter: "drop-shadow(0 0 4px var(--brand-orange))" }}>
                  <animateMotion dur="3.5s" repeatCount="indefinite" begin={`${j * 1.2}s`}
                                   path={`M ${x1} ${y} L ${x2} ${y}`}/>
                </circle>
              ))}
            </g>
          );
        })}
        {/* Stage nodes */}
        {stages.map((s, i) => {
          const x = (i + 0.5) * colWidth;
          const y = size.h / 2;
          const isWip = s.key === "progress";
          return (
            <g key={s.key}>
              <rect x={x - 80} y={y - nodeH / 2} width="160" height={nodeH} rx="12"
                    fill="var(--surface-hi)"
                    stroke={isWip ? "var(--brand-orange)" : "var(--line-hi)"}
                    strokeWidth={isWip ? 2 : 1}
                    style={{ filter: isWip ? "drop-shadow(0 0 12px rgba(230,126,34,0.5))" : "none" }}/>
              <text x={x} y={y - 10} textAnchor="middle" fontSize="10" fontWeight="700"
                    letterSpacing="2" fill="var(--text-dim)" style={{ textTransform: "uppercase" }}>
                {s.label}
              </text>
              <text x={x} y={y + 16} textAnchor="middle" fontFamily="JetBrains Mono"
                    fontSize="24" fontWeight="700" fill="var(--text)">
                {s.count}
              </text>
            </g>
          );
        })}
      </svg>
      <div style={{ position: "absolute", bottom: 12, left: "50%", transform: "translateX(-50%)",
                      fontSize: 10.5, color: "var(--text-mute)", letterSpacing: "0.08em",
                      textTransform: "uppercase" }}>
        Work flow across all projects · last 30 days
      </div>
    </div>
  );
}
window.FlowDiagram = FlowDiagram;

</script>
<script type="text/babel">
// CapacityRings — one donut per developer, tinted by utilization. Hover cross-highlights orbit.

function CapacityRings({ capacity }) {

    <div style={{ padding: "12px 18px 18px" }}>
      <div style={{ display: "grid", gap: 12,

              <window.Donut value={d.util} max={150} size={86} stroke={9}

              <div style={{ marginTop: 8, fontSize: 11.5, fontWeight: 600,

</script>

<script type="text/babel">
// ProjectDetail — per-project tile showing KPIs + chart + notes in the dark futuristic style.

function trendIcon(trend) {
  if (trend === "↑") return { char: "↑", color: "var(--brand-green)" };
  if (trend === "↓") return { char: "↓", color: "var(--brand-red)" };
  return { char: "→", color: "var(--text-mute)" };
}

function statusChip(status) {
  const map = {
    healthy:  { label: "On Track", color: "var(--brand-green)" },
    "at-risk":{ label: "At Risk",  color: "var(--brand-amber)" },
    critical: { label: "Critical", color: "var(--brand-red)" }
  };
  const s = map[status] || { label: status, color: "var(--text-dim)" };
  return (
    <span style={{
      display: "inline-flex", alignItems: "center", gap: 6,
      padding: "4px 10px", borderRadius: 9999,
      fontSize: 10.5, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase",
      color: s.color, background: s.color + "1A", border: `1px solid ${s.color}55`,
      boxShadow: status === "critical" ? `0 0 12px ${s.color}66` : "none"
    }}>
      <window.StatusDot status={status} pulse={status === "critical"} />
      {s.label}
    </span>
  );
}

// Small bar chart in futuristic style.
function MiniBars({ labels, data, yMax, color = "var(--brand-orange)", height = 110 }) {
  const max = yMax || Math.max(...data) * 1.15;
  return (
    <div style={{ display: "flex", alignItems: "flex-end", gap: 10, height, padding: "4px 0" }}>
      {data.map((v, i) => {
        const h = Math.max(4, (v / max) * (height - 24));
        return (
          <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 6 }}>
            <div className="mono" style={{ fontSize: 10, color: "var(--text-dim)" }}>{v}</div>
            <div style={{
              width: "100%", height: h, borderRadius: "6px 6px 0 0",
              background: `linear-gradient(180deg, ${color}, ${color}44)`,
              boxShadow: `0 0 10px ${color}55, inset 0 -1px 0 ${color}aa`,
              animation: `fade-up 600ms ${i * 80}ms both`
            }}></div>
            <div style={{ fontSize: 10, color: "var(--text-mute)", letterSpacing: "0.06em",
                           textTransform: "uppercase" }}>{labels[i]}</div>
          </div>
        );
      })}
    </div>
  );
}

function ProjectDetail({ projectKey, project, focused, onClick }) {
  const accent = window.ProjectColor[projectKey] || "var(--brand-orange)";
  const pulse = project.status === "critical";
  return (
    <div className="panel" onClick={onClick}
         style={{
           position: "relative", overflow: "hidden",
           borderColor: focused ? accent : "var(--line)",
           boxShadow: focused ? `0 0 0 1px ${accent}55, 0 0 32px ${accent}33` : undefined,
           cursor: "pointer", transition: "all 220ms"
         }}>
      {/* Accent bar */}
      <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 3,
                      background: `linear-gradient(90deg, ${accent}, transparent)` }}></div>
      {pulse && (
        <div aria-hidden style={{
          position: "absolute", top: -30, right: -30, width: 110, height: 110, borderRadius: "50%",
          background: "radial-gradient(circle, #EF444455, transparent 70%)",
          animation: "pulse-glow 2.4s ease-in-out infinite"
        }}></div>
      )}

      <div style={{ padding: "16px 18px 12px", borderBottom: "1px solid var(--line)" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6 }}>
          <div style={{ fontSize: 15, fontWeight: 700, color: "var(--text)" }}>{project.name}</div>
          <div style={{ flex: 1 }}></div>
          {statusChip(project.status)}
        </div>
        <div style={{ fontSize: 11, color: "var(--text-mute)", letterSpacing: "0.04em" }}>
          {project.workflow}
        </div>
        <div style={{ fontSize: 12, color: "var(--text-dim)", marginTop: 6, lineHeight: 1.4 }}>
          {project.statusNote}
        </div>
      </div>

      {/* KPI rows */}
      <div style={{ padding: "10px 6px" }}>
        {project.kpis.map((k, i) => {
          const t = trendIcon(k.trend);
          return (
            <div key={i} style={{
              display: "grid", gridTemplateColumns: "1fr auto auto auto", gap: 10,
              padding: "7px 12px", alignItems: "center",
              borderBottom: i < project.kpis.length - 1 ? "1px solid var(--line)" : "none"
            }}>
              <div style={{ fontSize: 11.5, color: "var(--text-dim)" }}>{k.kpi}</div>
              <div className="mono" style={{ fontSize: 12, fontWeight: 600, color: "var(--text)" }}>
                {k.value}
              </div>
              <div className="mono" style={{ fontSize: 10.5, color: "var(--text-mute)", whiteSpace: "nowrap" }}>
                {k.target}
              </div>
              <div style={{ fontSize: 14, color: t.color, width: 14, textAlign: "center" }}>{t.char}</div>
            </div>
          );
        })}
      </div>

      {/* Chart */}
      <div style={{ padding: "4px 16px 14px" }}>
        <div style={{ fontSize: 10, fontWeight: 700, color: "var(--text-mute)", letterSpacing: "0.12em",
                        textTransform: "uppercase", marginBottom: 8 }}>
          {project.chart.title}
        </div>
        <MiniBars labels={project.chart.labels} data={project.chart.data}
                  yMax={project.chart.yMax} color={accent}
                  height={project.chart.labels.length > 6 ? 80 : 110}/>
      </div>

      {/* Note */}
      {project.note && (
        <div style={{ padding: "12px 16px 14px", background: project.note.kind === "warning"
                          ? "rgba(245, 158, 11, 0.06)" : "rgba(43, 79, 114, 0.08)",
                        borderTop: "1px solid var(--line)" }}>
          <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.14em", textTransform: "uppercase",
                          color: project.note.kind === "warning" ? "var(--brand-amber)" : "var(--text-dim)",
                          marginBottom: 4 }}>
            {project.note.title}
          </div>
          <div style={{ fontSize: 12, color: "var(--text-dim)", lineHeight: 1.5 }}>
            {project.note.body}
          </div>
          {project.note.emphasis && (
            <div style={{ fontSize: 12, color: "var(--text)", marginTop: 6,
                            paddingTop: 6, borderTop: "1px dashed var(--line)",
                            fontWeight: 500 }}>
              {project.note.emphasis}
            </div>
          )}
        </div>
      )}
    </div>
  );
}
window.ProjectDetail = ProjectDetail;

</script>
<script type="text/babel">
// UtilizationTable — detailed per-developer table tied to orbit hover.
// Sortable, shows allocation breakdown + actual/planned + util bar.

function UtilizationTable({ capacity }) {
  const ctx = React.useContext(window.DashCtx);
  const [sortBy, setSortBy] = React.useState("util");
  const [sortDir, setSortDir] = React.useState("desc");

  const rows = [...capacity.rows].map(d => ({
    ...d,
    totalAlloc: d.ft + d.navi + d.dwh + d.rpa,
    band: d.util > 120 ? "over" : d.util >= 85 ? "healthy" : "under"
  }));
  rows.sort((a, b) => {
    const dir = sortDir === "asc" ? 1 : -1;
    if (sortBy === "name") return a.name.localeCompare(b.name) * dir;
    return (a[sortBy] - b[sortBy]) * dir;
  });

  const toggleSort = (key) => {
    if (sortBy === key) setSortDir(sortDir === "asc" ? "desc" : "asc");
    else { setSortBy(key); setSortDir("desc"); }
  };

  const Th = ({ k, children, align = "left" }) => (
    <th onClick={() => toggleSort(k)}
        style={{
          textAlign: align, padding: "10px 12px",
          fontSize: 10, fontWeight: 700, letterSpacing: "0.12em", textTransform: "uppercase",
          color: sortBy === k ? "var(--brand-orange)" : "var(--text-mute)",
          borderBottom: "1px solid var(--line)", cursor: "pointer", userSelect: "none",
          whiteSpace: "nowrap"
        }}>
      {children} {sortBy === k && (sortDir === "asc" ? "↑" : "↓")}
    </th>
  );

  return (
    <div style={{ padding: "4px 0 8px" }}>
      <div style={{ overflowX: "auto" }}>
        <table style={{ width: "100%", borderCollapse: "collapse", minWidth: 860 }}>
          <thead>
            <tr>
              <Th k="name">Developer</Th>
              <Th k="ft" align="center">FT</Th>
              <Th k="navi" align="center">NAVI</Th>
              <Th k="dwh" align="center">DWH</Th>
              <Th k="rpa" align="center">RPA</Th>
              <Th k="totalAlloc" align="right">Alloc</Th>
              <Th k="actual" align="right">Actual</Th>
              <Th k="capacity" align="right">Cap</Th>
              <Th k="util" align="right">Utilization</Th>
            </tr>
          </thead>
          <tbody>
            {rows.map((d, i) => {
              const isHover = ctx.hoverDev === d.name;
              const isDim = ctx.hoverDev && !isHover;
              const col = window.utilColor(d.util);
              const initials = d.name.split(" ").map(w => w[0]).join("").slice(0, 2);
              const barWidth = Math.min(100, (d.util / 170) * 100);
              return (
                <tr key={d.name}
                    onMouseEnter={() => ctx.setHoverDev(d.name)}
                    onMouseLeave={() => ctx.setHoverDev(null)}
                    style={{
                      background: isHover ? col + "14" : "transparent",
                      opacity: isDim ? 0.4 : 1,
                      transition: "all 180ms",
                      cursor: "pointer"
                    }}>
                  <td style={{ padding: "10px 12px", borderBottom: "1px solid var(--line)" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                      <span style={{
                        width: 26, height: 26, borderRadius: 7,
                        background: col + "22", color: col,
                        display: "inline-flex", alignItems: "center", justifyContent: "center",
                        fontSize: 10, fontWeight: 700, letterSpacing: "0.5px",
                        border: `1px solid ${col}55`
                      }}>{initials}</span>
                      <span style={{ fontSize: 13, color: "var(--text)", fontWeight: 500 }}>{d.name}</span>
                    </div>
                  </td>
                  {["ft", "navi", "dwh", "rpa"].map(k => (
                    <td key={k} className="mono" style={{
                      padding: "10px 12px", textAlign: "center",
                      fontSize: 12, fontWeight: 500,
                      color: d[k] > 0 ? "var(--text)" : "var(--text-mute)",
                      borderBottom: "1px solid var(--line)"
                    }}>
                      {d[k] > 0 ? (
                        <span style={{
                          display: "inline-block", padding: "2px 8px", borderRadius: 4,
                          background: window.AllocColor[k] + "1E", color: window.AllocColor[k],
                          fontWeight: 600
                        }}>{d[k]}%</span>
                      ) : "—"}
                    </td>
                  ))}
                  <td className="mono" style={{
                    padding: "10px 12px", textAlign: "right",
                    fontSize: 12, color: "var(--text)", fontWeight: 600,
                    borderBottom: "1px solid var(--line)"
                  }}>{d.totalAlloc}%</td>
                  <td className="mono" style={{
                    padding: "10px 12px", textAlign: "right",
                    fontSize: 12, color: "var(--text-dim)",
                    borderBottom: "1px solid var(--line)"
                  }}>{d.actual.toFixed(1)}h</td>
                  <td className="mono" style={{
                    padding: "10px 12px", textAlign: "right",
                    fontSize: 12, color: "var(--text-mute)",
                    borderBottom: "1px solid var(--line)"
                  }}>{d.capacity}h</td>
                  <td style={{
                    padding: "10px 12px",
                    borderBottom: "1px solid var(--line)", minWidth: 160
                  }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                      <div style={{ flex: 1, height: 6, borderRadius: 3, background: "var(--line)",
                                     overflow: "hidden", position: "relative" }}>
                        <div style={{
                          height: "100%", width: `${barWidth}%`,
                          background: `linear-gradient(90deg, ${col}, ${col}dd)`,
                          boxShadow: `0 0 8px ${col}88`,
                          transition: "width 600ms cubic-bezier(0.22, 1, 0.36, 1)"
                        }}></div>
                        {/* 85% and 120% markers */}
                        <div style={{ position: "absolute", left: `${(85/170)*100}%`, top: -1, bottom: -1,
                                        width: 1, background: "var(--text-mute)", opacity: 0.4 }}></div>
                        <div style={{ position: "absolute", left: `${(120/170)*100}%`, top: -1, bottom: -1,
                                        width: 1, background: "var(--text-mute)", opacity: 0.4 }}></div>
                      </div>
                      <span className="mono" style={{ fontSize: 12, fontWeight: 700, color: col,
                                                         minWidth: 42, textAlign: "right" }}>
                        {d.util}%
                      </span>
                    </div>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {/* Footer summary */}
      <div style={{
        display: "flex", gap: 20, flexWrap: "wrap",
        padding: "14px 18px", marginTop: 4,
        borderTop: "1px solid var(--line)",
        background: "linear-gradient(180deg, transparent, rgba(230,126,34,0.03))"
      }}>
        <div>
          <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.12em",
                          textTransform: "uppercase", color: "var(--text-mute)" }}>Avg Utilization</div>
          <div className="mono" style={{ fontSize: 16, fontWeight: 700, color: "var(--text)", marginTop: 2 }}>
            {Math.round(rows.reduce((a, b) => a + b.util, 0) / rows.length)}%
          </div>
        </div>
        <div>
          <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.12em",
                          textTransform: "uppercase", color: "var(--text-mute)" }}>Total Actual</div>
          <div className="mono" style={{ fontSize: 16, fontWeight: 700, color: "var(--text)", marginTop: 2 }}>
            {rows.reduce((a, b) => a + b.actual, 0).toFixed(1)}h
          </div>
        </div>
        <div>
          <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.12em",
                          textTransform: "uppercase", color: "var(--text-mute)" }}>Total Capacity</div>
          <div className="mono" style={{ fontSize: 16, fontWeight: 700, color: "var(--text)", marginTop: 2 }}>
            {rows.reduce((a, b) => a + b.capacity, 0)}h
          </div>
        </div>
        <div>
          <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.12em",
                          textTransform: "uppercase", color: "var(--text-mute)" }}>Over Target</div>
          <div className="mono" style={{ fontSize: 16, fontWeight: 700, color: "var(--brand-red)", marginTop: 2 }}>
            {rows.filter(r => r.util > 120).length} devs
          </div>
        </div>
        <div>
          <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.12em",
                          textTransform: "uppercase", color: "var(--text-mute)" }}>Under Target</div>
          <div className="mono" style={{ fontSize: 16, fontWeight: 700, color: "var(--brand-amber)", marginTop: 2 }}>
