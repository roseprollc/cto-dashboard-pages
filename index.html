// ---- Charts ------------------------------------------------------------------

function Burndown({ data, color }) {
  const W = 560, H = 220, pad = { l: 32, r: 12, t: 10, b: 24 };
  const max = 100;
  const xs = data.labels;
  const sx = (i) => pad.l + (i / (xs.length - 1)) * (W - pad.l - pad.r);
  const sy = (v) => pad.t + (1 - v / max) * (H - pad.t - pad.b);
  const toPath = (arr) => arr.map((v, i) => v == null ? null : `${i === 0 ? "M" : "L"} ${sx(i)} ${sy(v)}`)
                               .filter(Boolean).join(" ");
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", display: "block" }}>
      {/* gridlines */}
      {[0, 25, 50, 75, 100].map(g => (
        <g key={g}>
          <line x1={pad.l} x2={W - pad.r} y1={sy(g)} y2={sy(g)}
                stroke="var(--chart-grid)" strokeDasharray="2 4"/>
          <text x={pad.l - 6} y={sy(g) + 3} textAnchor="end"
                fontSize="9" fill="var(--text-mute)" fontFamily="JetBrains Mono">{g}</text>
        </g>
      ))}
      {/* ideal (dashed) */}
      <path d={toPath(data.ideal)} fill="none" stroke="var(--text-mute)" strokeWidth="1.2"
            strokeDasharray="4 4" opacity="0.7"/>
      {/* actual */}
      <path d={toPath(data.actual)} fill="none" stroke={color} strokeWidth="2.2"
            strokeLinecap="round" strokeLinejoin="round"
            style={{ filter: `drop-shadow(0 0 4px ${color}88)` }}/>
      {/* actual dots */}
      {data.actual.map((v, i) => v == null ? null : (
        <circle key={i} cx={sx(i)} cy={sy(v)} r="2.5" fill={color}/>
      ))}
      {/* x labels */}
      {xs.map((l, i) => i % 2 === 0 && (
        <text key={i} x={sx(i)} y={H - 6} textAnchor="middle"
              fontSize="9" fill="var(--text-mute)" fontFamily="JetBrains Mono">{l}</text>
      ))}
      {/* legend */}
      <g transform={`translate(${W - pad.r - 170}, ${pad.t + 4})`}>
        <line x1="0" y1="6" x2="18" y2="6" stroke={color} strokeWidth="2.2"/>
        <text x="24" y="9" fontSize="10" fill="var(--text-dim)">Actual</text>
        <line x1="70" y1="6" x2="88" y2="6" stroke="var(--text-mute)" strokeWidth="1.2" strokeDasharray="4 4"/>
        <text x="94" y="9" fontSize="10" fill="var(--text-dim)">Ideal</text>
      </g>
    </svg>
  );
}

function LineChart({ data, labels, color, unit = "" }) {
  const W = 560, H = 220, pad = { l: 36, r: 12, t: 10, b: 24 };
  const min = Math.min(...data), max = Math.max(...data);
  const pad2 = Math.max(1, (max - min) * 0.15);
  const yMin = Math.max(0, min - pad2);
  const yMax = max + pad2;
  const sx = (i) => pad.l + (i / (data.length - 1)) * (W - pad.l - pad.r);
  const sy = (v) => pad.t + (1 - (v - yMin) / (yMax - yMin)) * (H - pad.t - pad.b);
  const d = data.map((v, i) => `${i === 0 ? "M" : "L"} ${sx(i)} ${sy(v)}`).join(" ");
  const area = d + ` L ${sx(data.length - 1)} ${sy(yMin)} L ${sx(0)} ${sy(yMin)} Z`;
  const ticks = 4;
  const tickVals = Array.from({length: ticks + 1}, (_, i) => yMin + (i / ticks) * (yMax - yMin));
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", display: "block" }}>
      {tickVals.map((t, i) => (
        <g key={i}>
          <line x1={pad.l} x2={W - pad.r} y1={sy(t)} y2={sy(t)}
                stroke="var(--chart-grid)" strokeDasharray="2 4"/>
          <text x={pad.l - 6} y={sy(t) + 3} textAnchor="end"
                fontSize="9" fill="var(--text-mute)" fontFamily="JetBrains Mono">
            {t < 10 ? t.toFixed(1) : Math.round(t)}
          </text>
        </g>
      ))}
      <path d={area} fill={color} opacity="0.14"/>
      <path d={d} fill="none" stroke={color} strokeWidth="2.2"
            strokeLinecap="round" strokeLinejoin="round"
            style={{ filter: `drop-shadow(0 0 4px ${color}88)` }}/>
      {data.map((v, i) => (
        <g key={i}>
          <circle cx={sx(i)} cy={sy(v)} r="2.8" fill={color}/>
          {(i === data.length - 1 || i === 0) && (
            <text x={sx(i)} y={sy(v) - 8} textAnchor="middle" fontSize="10"
                  fontFamily="JetBrains Mono" fontWeight="700" fill="var(--text)">
              {v < 10 ? v.toFixed(1) : Math.round(v)}{unit}
            </text>
          )}
        </g>
      ))}
      {labels.map((l, i) => (
        <text key={i} x={sx(i)} y={H - 6} textAnchor="middle"
              fontSize="9" fill="var(--text-mute)" fontFamily="JetBrains Mono">{l}</text>
      ))}
    </svg>
  );
}

function BigBars({ labels, data, yMax, color }) {
  const max = yMax || Math.max(...data) * 1.15;
  const height = 200;
  return (
    <div style={{ display: "flex", alignItems: "flex-end", gap: 10, height, padding: "4px 0" }}>
      {data.map((v, i) => {
        const h = Math.max(4, (v / max) * (height - 40));
        return (
          <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column",
                                   alignItems: "center", gap: 8, minWidth: 0 }}>
            <div className="mono" style={{ fontSize: 11, fontWeight: 600, color: "var(--text-dim)" }}>
              {v}
            </div>
            <div style={{
              width: "100%", height: h, borderRadius: "6px 6px 0 0",
              background: `linear-gradient(180deg, ${color}, ${color}55)`,
              boxShadow: `0 0 10px ${color}55, inset 0 -1px 0 ${color}aa`,
              animation: `fade-up 600ms ${i * 70}ms both`
            }}></div>
            <div style={{ fontSize: 10, color: "var(--text-mute)", letterSpacing: "0.06em",
                           textTransform: "uppercase", whiteSpace: "nowrap",
                           overflow: "hidden", textOverflow: "ellipsis", width: "100%", textAlign: "center" }}>
              {labels[i]}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function WipFlow({ stages, color }) {
  const max = Math.max(...stages.map(s => s.count));
  return (
    <div style={{ display: "grid", gap: 10 }}>
      {stages.map((s, i) => {
        const w = max > 0 ? (s.count / max) * 100 : 0;
        const isRisk = /at.risk|blocked/i.test(s.stage);
        const col = isRisk ? "var(--brand-red)" : (s.stage.toLowerCase() === "done" ? "var(--brand-green)" : color);
        return (
          <div key={s.stage} style={{
            display: "grid", gridTemplateColumns: "90px 1fr 34px", gap: 10, alignItems: "center",
            animation: `fade-up 400ms ${i * 60}ms both`
          }}>
            <span style={{ fontSize: 11.5, color: "var(--text-dim)", letterSpacing: "0.04em" }}>
              {s.stage}
            </span>
            <div style={{ height: 22, borderRadius: 6, background: "var(--line)",
                            position: "relative", overflow: "hidden" }}>
              <div style={{
                height: "100%", width: `${w}%`,
                background: `linear-gradient(90deg, ${col}, ${col}aa)`,
                boxShadow: `0 0 10px ${col}88`,
                transition: "width 700ms cubic-bezier(0.22, 1, 0.36, 1)"
              }}></div>
              {isRisk && (
                <div aria-hidden style={{ position: "absolute", inset: 0,
                                              animation: "pulse-glow 2.4s ease-in-out infinite" }}></div>
              )}
            </div>
            <span className="mono" style={{ fontSize: 13, fontWeight: 700, color: "var(--text)", textAlign: "right" }}>
              {s.count}
            </span>
          </div>
        );
      })}
    </div>
  );
}

function AllocatedDevList({ devs, accent }) {
  const ctx = React.useContext(window.DashCtx);
  return (
    <div style={{ display: "grid", gap: 8 }}>
      {devs.map((d) => {
        const util = d.util;
        const utilCol = window.utilColor(util);
        const isHover = ctx.hoverDev === d.name;
        const isDim = ctx.hoverDev && !isHover;
        const initials = d.name.split(" ").map(w => w[0]).join("").slice(0, 2);
        return (
          <div key={d.name}
               onMouseEnter={() => ctx.setHoverDev(d.name)}
               onMouseLeave={() => ctx.setHoverDev(null)}
               style={{
                 display: "grid", gridTemplateColumns: "auto 1fr auto auto", gap: 12, alignItems: "center",
                 padding: "10px 12px", borderRadius: 10,
                 border: `1px solid ${isHover ? accent : "var(--line)"}`,
                 background: isHover ? accent + "10" : "var(--surface-hi)",
                 opacity: isDim ? 0.4 : 1,
                 transition: "all 180ms", cursor: "pointer"
               }}>
            <span style={{
              width: 30, height: 30, borderRadius: 8,
              background: accent + "22", color: accent,
              display: "inline-flex", alignItems: "center", justifyContent: "center",
              fontSize: 11, fontWeight: 700, letterSpacing: "0.5px",
              border: `1px solid ${accent}55`
            }}>{initials}</span>
            <div style={{ minWidth: 0 }}>
              <div style={{ fontSize: 13, color: "var(--text)", fontWeight: 500,
                              whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                {d.name}
              </div>
              <div className="mono" style={{ fontSize: 10.5, color: "var(--text-mute)", marginTop: 2 }}>
                {d.actual.toFixed(1)}h actual / {d.capacity}h cap
              </div>
            </div>
            <div style={{ textAlign: "right" }}>
              <div className="mono" style={{ fontSize: 13, fontWeight: 700, color: accent }}>
                {d.alloc}%
              </div>
              <div style={{ fontSize: 9.5, color: "var(--text-mute)", textTransform: "uppercase",
                              letterSpacing: "0.08em", marginTop: 2 }}>
                allocated
              </div>
            </div>
            <div className="mono" style={{
              padding: "3px 9px", borderRadius: 4,
              background: utilCol + "1E", color: utilCol,
              fontSize: 12, fontWeight: 700, minWidth: 50, textAlign: "center"
            }}>
              {util}%
            </div>
          </div>
        );
      })}
    </div>
  );
}

</script>
<script type="text/babel">
// DeliveryTab — Delivery Intelligence from Teams/Copilot meeting summaries.
// Guardrails: executive-brief, top 3 per category, one-line items, no noise.
// Phase 1: manual ingestion. Phase 2+: Microsoft Graph.

function DeliveryTab({ delivery, capacity }) {
  const accent = window.ProjectColor.delivery || "#0EA5E9";

  // Empty state — still show capacity table
  if (!delivery || delivery.meetingCount === 0) {
    return (
      <div>
        <DeliveryHeader accent={accent} subtitle="Meeting-derived delivery signals" />
        <div className="panel" style={{ padding: "48px 32px", textAlign: "center", marginBottom: 18 }}>
          <div style={{ fontSize: 40, marginBottom: 14, opacity: 0.25 }}>📡</div>
          <div style={{ fontSize: 15, fontWeight: 600, color: "var(--text-dim)", marginBottom: 6 }}>
            No meeting insights ingested yet.
          </div>
          <div style={{ fontSize: 12, color: "var(--text-mute)", maxWidth: 400, margin: "0 auto", lineHeight: 1.6 }}>
            Drop Copilot meeting summaries into <span className="mono" style={{ fontSize: 11, background: "var(--surface-hi)", padding: "1px 5px", borderRadius: 3 }}>data/meeting-notes/</span> and run the extractor.
          </div>
        </div>
        {capacity && capacity.rows && capacity.rows.length > 0 && (
          <div>
            <window.SectionLabel>Capacity</window.SectionLabel>
            <DeliveryCapacityTable capacity={capacity} accent={accent} />
          </div>
        )}
      </div>
    );
  }

  const D = delivery;
  const sentimentColor = D.sentiment.score === "positive" ? "#10B981"
                       : D.sentiment.score === "concerned" ? "#EF4444"
                       : D.sentiment.score === "mixed" ? "#F59E0B"
                       : "#94A3B8";

  // Guardrail: cap items shown per section
  const MAX_ITEMS = 3;

  return (
    <div>
      {/* Header with sentiment badge */}
      <DeliveryHeader accent={accent}
        subtitle={`${D.meetingCount} meeting${D.meetingCount !== 1 ? "s" : ""} · last sync ${D.latestMeetingDate || "—"}`}
        right={
          <span style={{
            display: "inline-flex", alignItems: "center", gap: 6,
            padding: "5px 12px", borderRadius: 9999,
            fontSize: 11, fontWeight: 700, letterSpacing: "0.06em", textTransform: "uppercase",
            color: sentimentColor, background: sentimentColor + "18",
            border: `1px solid ${sentimentColor}44`
          }}>
            <span style={{ width: 7, height: 7, borderRadius: "50%", background: sentimentColor,
                            boxShadow: `0 0 6px ${sentimentColor}88` }}></span>
            {D.sentiment.score}
          </span>
        }/>

      {/* Signal count strip — compact KPI tiles */}
      <div style={{ display: "grid", gap: 10, marginBottom: 18,
                      gridTemplateColumns: "repeat(4, 1fr)" }}>
        {[
          { label: "Risks",     n: D.risks.length,     c: "#EF4444", icon: "⚠" },
          { label: "Decisions",  n: D.decisions.length,  c: "#10B981", icon: "✓" },
          { label: "In Flight",   n: (D.openActions || {}).total || 0, c: accent, icon: "→" },
          { label: "Blockers",   n: D.blockers.length,   c: "#EF4444", icon: "✕" },
        ].map((m, i) => (
          <div key={i} style={{
            position: "relative", overflow: "hidden",
            padding: "14px 16px", background: "var(--surface)",
            border: "1px solid var(--line)", borderRadius: 12,
            animation: `fade-up 400ms ${i * 50}ms both`
          }}>
            <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 2,
                            background: `linear-gradient(90deg, transparent, ${m.c}, transparent)`, opacity: 0.6 }}></div>
            <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 6 }}>
              <span style={{ width: 18, height: 18, borderRadius: 4,
                              display: "inline-flex", alignItems: "center", justifyContent: "center",
                              background: m.c + "22", color: m.c, fontSize: 9, fontWeight: 700 }}>{m.icon}</span>
              <span style={{ fontSize: 9, fontWeight: 700, letterSpacing: "0.14em",
                              textTransform: "uppercase", color: "var(--text-mute)" }}>{m.label}</span>
            </div>
            <div className="mono" style={{ fontSize: 22, fontWeight: 700, color: "var(--text)" }}>{m.n}</div>
          </div>
        ))}
      </div>

      {/* Two-column: Risks + Decisions — top 3 each, one-line */}
      <div style={{ display: "grid", gap: 16, marginBottom: 16, gridTemplateColumns: "1fr 1fr" }}>
        <SignalPanel title="Top Risks" items={D.risks} max={MAX_ITEMS}
          dotColor="#EF4444" accent="#EF4444" emptyMsg="No risks identified." />
        <SignalPanel title="Key Decisions" items={D.decisions} max={MAX_ITEMS}
          dotColor="#10B981" accent="#10B981" emptyMsg="No decisions recorded." />
      </div>

      {/* Open Actions — per-project one-line summaries from Jira */}
      {D.openActions && D.openActions.projects && D.openActions.projects.length > 0 && (
        <div className="panel" style={{ marginBottom: 16 }}>
          <window.PanelHeader title="Open Actions · Live from Jira" accent={accent} icon="→"
            right={<span className="mono" style={{ fontSize: 11, color: accent }}>
              {D.openActions.total} active across portfolio
            </span>}/>
          <div style={{ padding: "8px 4px 10px" }}>
            {D.openActions.projects.map((p, pi) => (
              <div key={p.projectKey} style={{
                padding: "12px 18px",
                borderBottom: pi < D.openActions.projects.length - 1 ? "1px solid var(--line)" : "none"
              }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6 }}>
                  <span style={{ display: "inline-block", padding: "2px 10px", borderRadius: 4,
                    background: p.color + "1A", color: p.color,
                    fontSize: 11, fontWeight: 700, letterSpacing: "0.04em" }}>{p.project}</span>
                  <span className="mono" style={{ fontSize: 12, fontWeight: 700, color: "var(--text-mute)" }}>
                    {p.activeCount} active
                  </span>
                </div>
                <div style={{ paddingLeft: 4 }}>
                  {p.bullets.map((b, i) => (
                    <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: 8, padding: "3px 0" }}>
                      <span style={{ width: 4, height: 4, borderRadius: "50%", background: p.color,
                                      marginTop: 6, flexShrink: 0, opacity: 0.7 }}></span>
                      <span style={{ fontSize: 12.5, color: "var(--text-dim)", lineHeight: 1.45 }}>{b}</span>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Blockers + Dependencies — only if they exist */}
      {(D.blockers.length > 0 || D.dependencies.length > 0) && (
        <div style={{ display: "grid", gap: 16, marginBottom: 16,
                        gridTemplateColumns: D.blockers.length > 0 && D.dependencies.length > 0 ? "1fr 1fr" : "1fr" }}>
          {D.blockers.length > 0 && (
            <SignalPanel title="Blockers" items={D.blockers} max={MAX_ITEMS}
              dotColor="#EF4444" accent="#EF4444" />
          )}
          {D.dependencies.length > 0 && (
            <SignalPanel title="Dependencies" items={D.dependencies} max={MAX_ITEMS}
              dotColor="#94A3B8" accent="#94A3B8" />
          )}
        </div>
      )}

      {/* Capacity Matrix — always show if capacity data exists */}
      {capacity && capacity.rows && capacity.rows.length > 0 && (
        <div>
          <window.SectionLabel>Capacity</window.SectionLabel>
          <DeliveryCapacityTable capacity={capacity} accent={accent} />
        </div>
      )}
    </div>
  );
}
window.DeliveryTab = DeliveryTab;

// -- Shared sub-components (private to this file) --

function DeliveryHeader({ accent, subtitle, right }) {
  return (
    <div className="panel" style={{ position: "relative", overflow: "hidden", marginBottom: 18 }}>
      <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 3,
                      background: `linear-gradient(90deg, ${accent}, transparent)` }}></div>
      <div style={{ padding: "18px 24px", display: "flex", alignItems: "center", gap: 16, flexWrap: "wrap" }}>
        <div style={{ flex: 1, minWidth: 200 }}>
          <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.18em",
                          textTransform: "uppercase", color: accent, marginBottom: 3 }}>
            Delivery Intelligence · Teams/Copilot
          </div>
          <div style={{ fontSize: 22, fontWeight: 700, color: "var(--text)", letterSpacing: "-0.02em" }}>
            Delivery
          </div>
          {subtitle && (
            <div className="mono" style={{ fontSize: 11.5, color: "var(--text-mute)", marginTop: 4 }}>
              {subtitle}
            </div>
          )}
        </div>
        {right}
      </div>
    </div>
  );
}

function SignalPanel({ title, items, max = 3, dotColor, accent, emptyMsg, numbered }) {
  const shown = items.slice(0, max);
  const overflow = items.length - max;
  return (
    <div className="panel">
      <window.PanelHeader title={title} accent={accent}
        icon={numbered ? "→" : title.includes("Risk") ? "⚠" : title.includes("Decision") ? "✓"
              : title.includes("Block") ? "✕" : "·"}
        right={items.length > 0 ? (
          <span className="mono" style={{ fontSize: 10, color: "var(--text-mute)" }}>{items.length}</span>
        ) : null} />
      <div style={{ padding: "6px 4px 10px" }}>
        {shown.length > 0 ? shown.map((item, i) => (
          <div key={i} style={{ padding: "9px 18px", borderBottom: i < shown.length - 1 ? "1px solid var(--line)" : "none",
                                  display: "flex", gap: 10, alignItems: "flex-start" }}>
            {numbered ? (
              <span className="mono" style={{ width: 16, height: 16, borderRadius: 3,
                display: "inline-flex", alignItems: "center", justifyContent: "center",
                background: dotColor + "22", color: dotColor, fontSize: 9, fontWeight: 700,
                flexShrink: 0, marginTop: 2 }}>{i + 1}</span>
            ) : (
              <span style={{ width: 6, height: 6, borderRadius: "50%", background: dotColor,
                              boxShadow: `0 0 6px ${dotColor}55`, marginTop: 6, flexShrink: 0 }}></span>
            )}
            <span style={{ fontSize: 12.5, color: "var(--text)", fontWeight: 500, lineHeight: 1.4 }}>
              {item.text}
            </span>
          </div>
        )) : (
          <div style={{ padding: "14px 18px", color: "var(--text-mute)", fontSize: 12 }}>
            {emptyMsg || "None."}
          </div>
        )}
        {overflow > 0 && (
          <div style={{ padding: "6px 18px 2px", fontSize: 11, color: "var(--text-mute)" }}>
            +{overflow} more
          </div>
        )}
      </div>
    </div>
  );
}

function DeliveryCapacityTable({ capacity, accent }) {
  const rows = [...capacity.rows].sort((a, b) => b.util - a.util);
  return (
    <div className="panel" style={{ marginBottom: 20 }}>
      <window.PanelHeader title={`Developer Utilization · ${capacity.month}`} accent={accent} icon="D"
        right={<span className="mono" style={{ fontSize: 11, color: "var(--text-mute)" }}>
          {capacity.actualHours}/{capacity.plannedHours}h · {capacity.utilization}% util
        </span>}/>
      <div style={{ padding: "4px 0 8px" }}>
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", minWidth: 700 }}>
            <thead>
              <tr>
                {["Developer", "FT", "NAVI", "DWH", "RPA", "Actual", "Cap", "Utilization"].map((h, i) => (
                  <th key={h} style={{
                    textAlign: i === 0 ? "left" : "right",
                    padding: "9px 14px", fontSize: 10, fontWeight: 700,
                    letterSpacing: "0.12em", textTransform: "uppercase",
                    color: "var(--text-mute)", borderBottom: "1px solid var(--line)",
                    whiteSpace: "nowrap"
                  }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {rows.map(d => {
                const col = window.utilColor(d.util);
                const initials = d.name.split(" ").map(w => w[0]).join("").slice(0, 2);
                const barWidth = Math.min(100, (d.util / 150) * 100);
                return (
                  <tr key={d.name} style={{ transition: "background 180ms" }}
                      onMouseEnter={e => e.currentTarget.style.background = "var(--surface-hi)"}
                      onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                    <td style={{ padding: "10px 14px", borderBottom: "1px solid var(--line)" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <span style={{
                          width: 24, height: 24, borderRadius: 6,
                          background: col + "22", color: col,
                          display: "inline-flex", alignItems: "center", justifyContent: "center",
                          fontSize: 9, fontWeight: 700, border: `1px solid ${col}55`
                        }}>{initials}</span>
                        <span style={{ fontSize: 12.5, color: "var(--text)", fontWeight: 500 }}>{d.name}</span>
                      </div>
                    </td>
                    {["ft", "navi", "dwh", "rpa"].map(k => (
                      <td key={k} className="mono" style={{
                        padding: "10px 14px", textAlign: "right", fontSize: 11.5,
                        color: d[k] > 0 ? "var(--text)" : "var(--text-mute)",
                        borderBottom: "1px solid var(--line)"
                      }}>
                        {d[k] > 0 ? (
                          <span style={{ display: "inline-block", padding: "1px 7px", borderRadius: 3,
                            background: (window.AllocColor[k] || "#64748B") + "1A",
                            color: window.AllocColor[k] || "#64748B", fontWeight: 600 }}>{d[k]}%</span>
                        ) : "—"}
                      </td>
                    ))}
                    <td className="mono" style={{ padding: "10px 14px", textAlign: "right",
                          fontSize: 11.5, color: "var(--text-dim)", borderBottom: "1px solid var(--line)" }}>
                      {d.actual.toFixed(1)}h
                    </td>
                    <td className="mono" style={{ padding: "10px 14px", textAlign: "right",
                          fontSize: 11.5, color: "var(--text-mute)", borderBottom: "1px solid var(--line)" }}>
                      {d.capacity}h
                    </td>
                    <td style={{ padding: "10px 14px", borderBottom: "1px solid var(--line)", minWidth: 140 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <div style={{ flex: 1, height: 5, borderRadius: 3, background: "var(--line)",
                                       overflow: "hidden", position: "relative" }}>
                          <div style={{
                            height: "100%", width: `${barWidth}%`,
                            background: `linear-gradient(90deg, ${col}, ${col}dd)`,
                            boxShadow: barWidth > 0 ? `0 0 6px ${col}66` : "none",
                            transition: "width 500ms"
                          }}></div>
                          <div style={{ position: "absolute", left: `${(100/150)*100}%`, top: -1, bottom: -1,
                                          width: 1, background: "var(--text-mute)", opacity: 0.3 }}></div>
                        </div>
                        <span className="mono" style={{ fontSize: 11.5, fontWeight: 700, color: col,
                                                           minWidth: 38, textAlign: "right" }}>{d.util}%</span>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        {/* Footer summary */}
        <div style={{ display: "flex", gap: 20, flexWrap: "wrap", padding: "12px 16px",
                        borderTop: "1px solid var(--line)", marginTop: 2 }}>
          {[
            { label: "Avg Util", value: Math.round(rows.reduce((a, b) => a + b.util, 0) / rows.length) + "%",
              color: "var(--text)" },
            { label: "Over 100%", value: rows.filter(r => r.util > 100).length + " devs",
              color: "var(--brand-red)" },
            { label: "Under 50%", value: rows.filter(r => r.util < 50).length + " devs",
              color: "var(--brand-amber)" }
          ].map(s => (
            <div key={s.label}>
              <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: "0.12em",
                              textTransform: "uppercase", color: "var(--text-mute)" }}>{s.label}</div>
              <div className="mono" style={{ fontSize: 14, fontWeight: 700, color: s.color, marginTop: 2 }}>{s.value}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

</script>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((key, val) => {
    setValues((prev) => ({ ...prev, [key]: val }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

                  <span className="mono" style={{ fontSize: 10.5, padding: "3px 8px",
                                                     borderRadius: 4, background: "rgba(230,126,34,0.12)",
                                                     color: "var(--brand-orange)" }}>
                    32h/wk cap
                  </span>
                </div>
              </div>
            </div>
          </div>

          <div className="panel" style={{ padding: "16px 18px" }}>
            <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.16em",
                            textTransform: "uppercase", color: "var(--text-mute)", marginBottom: 10 }}>
              Utilization Bands
            </div>
            {[
              { label: "Healthy", range: "85–120%", color: "#10B981", count: 2 },
              { label: "Under",   range: "< 85%",   color: "#F59E0B", count: 4 },
              { label: "Over",    range: "> 120%",  color: "#EF4444", count: 4 }
            ].map(b => (
              <div key={b.label} style={{ display: "flex", alignItems: "center", gap: 10,
                                            padding: "7px 0", borderBottom: "1px solid var(--line)" }}>
                <span style={{ width: 10, height: 10, borderRadius: 2, background: b.color,
                                boxShadow: `0 0 8px ${b.color}88` }}></span>
                <span style={{ fontSize: 12, color: "var(--text)", flex: 1 }}>{b.label}</span>
                <span className="mono" style={{ fontSize: 11, color: "var(--text-mute)" }}>{b.range}</span>
                <span className="mono" style={{ fontSize: 12, color: "var(--text)", minWidth: 20, textAlign: "right" }}>
                  {b.count}
                </span>
              </div>
            ))}
            <div style={{ fontSize: 11, color: "var(--text-mute)", marginTop: 10, lineHeight: 1.5 }}>
              4 developers over target — Connor, Derek, Louis, Prasanth.
            </div>
          </div>
        </div>
      </div>

      {/* Developer Utilization — detailed table */}
      <div className="panel" style={{ marginBottom: 22 }}>
        <window.PanelHeader title="Developer Utilization · Per-Person Capacity Matrix"
          accent="var(--brand-orange)" icon="D"
          right={<span style={{ fontSize: 11, color: "var(--text-mute)" }}>
            Hover a row to cross-highlight on the orbit · click column headers to sort
          </span>}/>
        <window.UtilizationTable capacity={D.capacity}/>
      </div>

      {/* Risks + Wins */}
      <div style={{ marginBottom: 22 }}>
        <window.RisksWinsPanel risks={D.risks} wins={D.wins}/>
      </div>
    </div>
  );
}

function DashBridge({ hoverDev, setHoverDev, focusProject, setFocusProject }) {
  const ctx = React.useContext(window.DashCtx);
  React.useEffect(() => {
    if (ctx.hoverDev !== hoverDev) setHoverDev(ctx.hoverDev);
  }, [ctx.hoverDev]);
  React.useEffect(() => {
    if (ctx.hoverDev !== hoverDev) ctx.setHoverDev(hoverDev);
  }, [hoverDev]);
  React.useEffect(() => {
    if (ctx.focusProject !== focusProject) setFocusProject(ctx.focusProject);
  }, [ctx.focusProject]);
  React.useEffect(() => {
    if (ctx.focusProject !== focusProject) ctx.setFocusProject(focusProject);
  }, [focusProject]);
  return null;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);

</script>
</body>
</html>
